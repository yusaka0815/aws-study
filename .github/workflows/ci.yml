name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチへの push が連続した場合、前回のrunをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ============================================================
  # Job 1: 単体テスト (Vitest)
  # ============================================================
  unit-test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests with coverage
        run: npx vitest run --reporter=verbose --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ============================================================
  # Job 2: E2Eテスト (Playwright)
  # 単体テストが通った場合のみ実行
  # ============================================================
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers (Chromium only for CI)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          set -o pipefail
          npx playwright test 2>&1 | tee /tmp/pw-output.txt || {
            echo "::error::=== PLAYWRIGHT FAILURE (last 30 lines) ==="
            tail -30 /tmp/pw-output.txt | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          }
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure evidence (screenshots / videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failure-evidence
          path: test-results/
          retention-days: 7

  # ============================================================
  # Job 3: GitHub Pages へデプロイ
  # main ブランチへの push かつ全テスト通過時のみ実行
  # ============================================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Upload src/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
